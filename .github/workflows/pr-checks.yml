name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: TypeScript Check
        run: bunx tsc --noEmit
      
      - name: ESLint
        run: bun --bun lint
      
      - name: Jest Tests
        run: bun --bun test
