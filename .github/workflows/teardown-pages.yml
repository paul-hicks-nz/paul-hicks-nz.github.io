name: Teardown GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  teardown:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deactivate GitHub Pages
        run: |
          echo "The GitHub API does not support deleting a Pages deployment."
          echo "Deactivate it by navigating to the repository's Settings > Pages and clicking 'Unpublish'."
